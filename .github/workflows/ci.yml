name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # mdBook silently skips src pages missing from SUMMARY.md, so links to
      # them 404 on the published site; fail fast before the slow build.
      - name: Check SUMMARY.md coverage
        run: python3 tools/check-summary-coverage.py

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build book
        run: mdbook build

  links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 16
            --max-retries 3
            --retry-wait-time 2
            --accept 200,204,206,301,302,429
            --exclude '^https://questdb\.com/docs/'
            README.md
            'src/**/*.md'
