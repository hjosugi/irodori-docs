name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.5.3"
      - run: mdbook build
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Warn when GitHub Pages deploy backend fails
        if: steps.deployment.outcome == 'failure'
        run: >-
          echo "::warning::GitHub Pages accepted the artifact but marked the deployment
          failed. The mdBook build and artifact upload passed; rerun this workflow when
          the Pages backend is healthy."
