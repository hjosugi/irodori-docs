[book]
title = "Irodori Table Documentation"
authors = ["Irodori Table contributors"]
description = "Planning, architecture, reference, and policy docs for Irodori Table."
language = "en"
src = "src"

[output.html]
git-repository-url = "https://github.com/hjosugi/irodori-docs"
edit-url-template = "https://github.com/hjosugi/irodori-docs/edit/main/{path}"
site-url = "/irodori-docs/"
default-theme = "light"
preferred-dark-theme = "navy"
additional-css = ["irodori.css"]
additional-js = ["irodori.js"]

[output.html.redirect]
# Retired pages (content moved to the private archive); keep inbound URLs
# from sibling repos working by pointing at the closest public successor.
"/feature-matrix.html" = "data-source-support-status.html"
"/production-readiness.html" = "roadmap-1.0.html"
"/implementation-backlog.html" = "roadmap-1.0.html"
"/cheatsheet-autodoc-plan.html" = "knowledge-base.html"

[output.html.search]
enable = true

[output.html.fold]
enable = true
level = 1

# PDF output is produced in CI via the `mdbook-pdf` backend (see .github/workflows).
